name: E2E Tests

on:
  # Chạy tự động mỗi ngày làm việc lúc 2AM UTC+7 (= 19:00 UTC)
  schedule:
    - cron: '0 19 * * 0-4'

  # Cho phép chạy thủ công từ GitHub Actions UI
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        type: choice
        default: 'smoke'
        options:
          - smoke
          - regression
          - full
      base_url:
        description: 'Override BASE_URL (optional)'
        type: string
        required: false

  # Chạy khi push test specs mới
  push:
    branches: [main, master]
    paths:
      - 'specs/**'
      - 'helpers/**'
      - 'pages/**'
      - 'playwright.config.js'

# Không chạy duplicate khi cùng lúc push + schedule
concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

# Permissions cần thiết để publish lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: E2E Tests (${{ github.event.inputs.test_suite || 'smoke' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          SUITE="${{ github.event.inputs.test_suite || 'smoke' }}"
          if [ "$SUITE" = "full" ]; then
            npx playwright test
          else
            npx playwright test --grep "@${SUITE}"
          fi
        env:
          CI: true
          BASE_URL: ${{ github.event.inputs.base_url || secrets.TEST_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
          TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}

      - name: Generate dashboard
        if: always()
        run: node helpers/generate-dashboard.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            reports/html/
            reports/modules/
            reports/results.json
            reports/dashboard.md
            reports/screenshots/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: reports/html/
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/html/

  deploy-report:
    name: Deploy to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
