name: Playwright Tests & Deploy Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Grant GitHub Actions permissions to publish pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'https://qtltest368329.movex.vn' }}
        TEST_EMAIL: ${{ secrets.TEST_EMAIL || 'owner.368329@qtllogistics.vn' }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'Movex@2026' }}
      # Run even if some tests fail so we can publish the report showing the test status
      run: npx playwright test || true

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './reports/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
